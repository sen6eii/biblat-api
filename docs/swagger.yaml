openapi: 3.0.0
info:
  title: Biblat API
  description: API pública y gratuita de literatura latinoamericana. Datos provenientes de Open Library.
  version: 1.0.0
  contact:
    email: dgmartinez.uy@gmail.com

servers:
  - url: http://localhost:3000
    description: Desarrollo local
  - url: https://biblat.up.railway.app
    description: Producción

tags:
  - name: books
    description: Operaciones sobre libros
  - name: authors
    description: Listado de autores
  - name: categories
    description: Listado de categorías

paths:
  /:
    get:
      summary: Health check e info de la API
      responses:
        "200":
          description: Info de la API
          content:
            application/json:
              schema:
                type: object

  /v1/books:
    get:
      tags: [books]
      summary: Lista de libros (paginado, con filtros opcionales)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: category
          schema:
            type: string
          example: Literatura Argentina
        - in: query
          name: author
          schema:
            type: string
          example: Borges
      responses:
        "200":
          description: Lista de libros
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"

    post:
      tags: [books]
      summary: Crear un libro (requiere API key)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Libro creado
        "401":
          description: API key inválida

  /v1/books/search:
    get:
      tags: [books]
      summary: Búsqueda full-text por título o autor
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          example: García Márquez
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Resultados de búsqueda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookList"
        "400":
          description: Parámetro q requerido

  /v1/books/isbn/{isbn}:
    get:
      tags: [books]
      summary: Buscar libro por ISBN
      parameters:
        - in: path
          name: isbn
          required: true
          schema:
            type: string
          example: 978-84-376-0494-7
      responses:
        "200":
          description: Libro encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSingle"
        "404":
          description: Libro no encontrado

  /v1/books/{id}:
    get:
      tags: [books]
      summary: Obtener un libro por UUID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Libro encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSingle"
        "404":
          description: Libro no encontrado

    put:
      tags: [books]
      summary: Editar un libro (requiere API key)
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Libro actualizado
        "401":
          description: API key inválida
        "404":
          description: Libro no encontrado

    delete:
      tags: [books]
      summary: Eliminar un libro (requiere API key)
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Libro eliminado
        "401":
          description: API key inválida

  /v1/authors:
    get:
      tags: [authors]
      summary: Lista de autores únicos
      responses:
        "200":
          description: Lista de autores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer

  /v1/categories:
    get:
      tags: [categories]
      summary: Lista de categorías únicas
      responses:
        "200":
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Cien años de soledad
        author:
          type: string
          example: Gabriel García Márquez
        year:
          type: integer
          example: 1967
        editorial:
          type: string
          example: Sudamericana
        category:
          type: string
          example: Literatura Colombiana
        isbn:
          type: string
          example: 978-84-376-0494-7
        cover_url:
          type: string
          format: uri
          example: https://covers.openlibrary.org/b/id/8739161-L.jpg
        subject:
          type: string
          example: colombian_literature
        created_at:
          type: string
          format: date-time

    BookInput:
      type: object
      required: [title, author]
      properties:
        title:
          type: string
        author:
          type: string
        year:
          type: integer
        editorial:
          type: string
        category:
          type: string
        isbn:
          type: string
        cover_url:
          type: string
        subject:
          type: string

    BookSingle:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Book"

    BookList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            pages:
              type: integer
